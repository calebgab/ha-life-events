blueprint:
  name: Life Events — Notifications
  description: >
    Send a notification for upcoming birthdays, anniversaries, and custom events
    from the Life Events integration.


    Checks your Life Events sensors daily at a time you choose and sends
    notifications on the day of the event and/or a set number of days before.


    **Requires:** Life Events integration installed and configured.

  domain: automation
  input:
    notify_service:
      name: Notification service
      description: >
        The notification service to call (e.g. `notify.mobile_app_my_phone`,
        `notify.notify`, `notify.alexa_media`).
      selector:
        text:
          multiline: false

    notify_time:
      name: Notification time
      description: What time of day should notifications be sent?
      default: "09:00:00"
      selector:
        time:

    notify_on_day:
      name: Notify on the day
      description: Send a notification on the day of the event.
      default: true
      selector:
        boolean:

    notify_days_before:
      name: Notify days in advance
      description: >
        Also send a notification this many days before the event.
        Set to 0 to only notify on the day.
      default: 7
      selector:
        number:
          min: 0
          max: 30
          unit_of_measurement: days

    notify_title:
      name: Notification title
      description: Title shown on the notification.
      default: "Life Events Reminder"
      selector:
        text:
          multiline: false

trigger:
  - platform: time
    at: !input notify_time

action:
  - variables:
      notify_on_day: !input notify_on_day
      notify_days_before: !input notify_days_before
      title: !input notify_title
      service: !input notify_service

  - repeat:
      for_each: >
        {% set ns = namespace(events=[]) %}
        {% for s in states.sensor
            | selectattr('entity_id', 'match', 'sensor.life_events_.*') %}
          {% set ns.events = ns.events + [{
            'entity_id': s.entity_id,
            'state': s.state,
            'name': s.attributes.name | default(s.entity_id),
            'event_label': s.attributes.event_label | default('Event'),
            'years_at_next': s.attributes.years_at_next | default(none)
          }] %}
        {% endfor %}
        {{ ns.events }}
      sequence:
        - if:
            - condition: template
              value_template: >
                {% set days = repeat.item.state | int(-1) %}
                {{ (notify_on_day and days == 0) or
                   (notify_days_before | int > 0 and days == notify_days_before | int) }}
          then:
            - service: "{{ service }}"
              data:
                title: "{{ title }}"
                message: >
                  {% set days = repeat.item.state | int(-1) %}
                  {% set name = repeat.item.name %}
                  {% set label = repeat.item.event_label %}
                  {% set years = repeat.item.years_at_next %}
                  {% if days == 0 %}
                    🎉 Today is {{ name }}'s {{ label }}{% if years is not none and years != 'None' %} — turning {{ years }}!{% endif %}
                  {% else %}
                    📅 {{ name }}'s {{ label }} is in {{ days }} day{% if days != 1 %}s{% endif %}{% if years is not none and years != 'None' %} — turning {{ years }}{% endif %}!
                  {% endif %}

mode: single

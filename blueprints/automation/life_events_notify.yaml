blueprint:
  name: Life Events — Notifications
  description: >
    Send a notification for upcoming birthdays, anniversaries, and custom events
    from the Life Events integration.


    Checks your Life Events sensors daily at a time you choose and sends
    notifications on the day of the event and/or a set number of days before.


    **Requires:** Life Events integration installed and configured.

  domain: automation
  input:
    notify_service:
      name: Notification service
      description: >
        The notification service to call (e.g. `notify.mobile_app_my_phone`,
        `notify.notify`, `notify.alexa_media`).
      selector:
        text:
          multiline: false

    notify_time:
      name: Notification time
      description: What time of day should notifications be sent?
      default: "09:00:00"
      selector:
        time:

    notify_on_day:
      name: Notify on the day
      description: Send a notification on the day of the event.
      default: true
      selector:
        boolean:

    notify_days_before:
      name: Notify days in advance
      description: >
        Also send a notification this many days before the event.
        Set to 0 to only notify on the day.
      default: 7
      selector:
        number:
          min: 0
          max: 30
          unit_of_measurement: days

    message_today:
      name: Message — on the day
      description: >
        Notification message sent on the day of the event.
        Available variables: {{ name }}, {{ event_label }}, {{ years }}.
      default: "🎉 Today is {{ name }}'s {{ event_label }}{% if years is not none %} — turning {{ years }}!{% endif %}"
      selector:
        text:
          multiline: true

    message_upcoming:
      name: Message — upcoming reminder
      description: >
        Notification message sent in advance.
        Available variables: {{ name }}, {{ event_label }}, {{ years }}, {{ days_until }}.
      default: "📅 {{ name }}'s {{ event_label }} is in {{ days_until }} day{% if days_until != 1 %}s{% endif %}{% if years is not none %} — turning {{ years }}{% endif %}!"
      selector:
        text:
          multiline: true

    notify_title:
      name: Notification title
      description: Title shown on the notification.
      default: "Life Events Reminder"
      selector:
        text:
          multiline: false

trigger:
  - platform: time
    at: !input notify_time

action:
  - variables:
      notify_on_day: !input notify_on_day
      notify_days_before: !input notify_days_before
      message_today_tpl: !input message_today
      message_upcoming_tpl: !input message_upcoming
      title: !input notify_title
      service: !input notify_service

  - repeat:
      for_each: >
        {{ states.sensor
            | selectattr('entity_id', 'match', 'sensor.life_events_.*')
            | list }}
      sequence:
        - variables:
            days_until: "{{ repeat.item.state | int(-1) }}"
            name: "{{ repeat.item.attributes.name | default(repeat.item.entity_id) }}"
            event_label: "{{ repeat.item.attributes.event_label | default('Event') }}"
            years: "{{ repeat.item.attributes.years_at_next | default(none, true) }}"

        - if:
            - condition: template
              value_template: >
                {{ (notify_on_day and days_until == 0) or
                   (notify_days_before | int > 0 and days_until == notify_days_before | int) }}
          then:
            - variables:
                message: >
                  {% if days_until == 0 %}
                    {{ message_today_tpl }}
                  {% else %}
                    {{ message_upcoming_tpl }}
                  {% endif %}
            - service: "{{ service }}"
              data:
                title: "{{ title }}"
                message: "{{ message }}"

mode: single

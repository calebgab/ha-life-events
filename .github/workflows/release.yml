name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate manifest version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/life_events/manifest.json'))['version'])")
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "❌ Tag $TAG does not match manifest version $MANIFEST_VERSION"
            exit 1
          fi
          echo "✅ Version $TAG matches manifest"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            custom_components/life_events/**
            www/life-events-card.js
            blueprints/automation/life_events_notify.yaml
